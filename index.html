<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학 멘토 선생님</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fae6"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 2rem 1rem; }
.wrap { max-width: 680px; margin: 0 auto; }
.hd { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0; }
.hd h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
.hd p { font-size: 13px; color: #666; }
.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.upload { border: 2px dashed #ccc; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; background: #fafafa; margin-bottom: 1rem; }
.upload:hover { background: #f0f0f0; }
.upload p { font-size: 14px; color: #666; margin-bottom: 4px; }
.upload small { font-size: 12px; color: #999; }
#previewImg { max-width: 100%; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #e0e0e0; display: none; }
.analyze-btn { width: 100%; padding: 12px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 1rem; display: none; }
.analyze-btn:hover { background: #0C447C; }
.loading { text-align: center; padding: 1.5rem; display: none; }
.spinner { width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { font-size: 13px; color: #666; }
.concept-card { display: none; margin-bottom: 1rem; }
.section-label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { background: #E6F1FB; color: #0C447C; font-size: 12px; padding: 5px 12px; border-radius: 20px; font-weight: 500; }
.sol-card { display: none; margin-bottom: 1rem; }
.sol-card h3 { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 12px; }
.step { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
.snum { min-width: 24px; height: 24px; border-radius: 50%; background: #185FA5; color: #fff; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
.stxt { font-size: 14px; color: #222; line-height: 1.9; }
.answer-box { margin-top: 12px; padding: 12px; background: #E6F1FB; border-radius: 8px; font-size: 15px; font-weight: 600; color: #0C447C; }
.graph-wrap { margin-top: 1rem; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; display: none; }
.graph-wrap h4 { padding: 8px 12px; background: #185FA5; color: #fff; font-size: 13px; font-weight: 500; }
#calculator { width: 100%; height: 320px; }
.chat-wrap { display: none; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; margin-top: 1rem; }
.chat-header { padding: 10px 14px; background: #185FA5; color: #fff; font-size: 13px; font-weight: 500; }
.chat-msgs { padding: 1rem; min-height: 120px; max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
.msg { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.9; max-width: 90%; }
.msg.bot { background: #fff; color: #222; align-self: flex-start; border: 1px solid #e0e0e0; }
.msg.user { background: #185FA5; color: #fff; align-self: flex-end; }
.chat-input { display: flex; border-top: 1px solid #e0e0e0; }
.chat-input input { flex: 1; padding: 12px 14px; font-size: 13px; border: none; outline: none; background: #fff; }
.chat-input button { padding: 12px 18px; background: #185FA5; color: #fff; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
.chat-input button:hover { background: #0C447C; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <h1>수학 멘토 선생님</h1>
    <p>31년 경력 선생님의 개념 중심 AI 풀이 서비스</p>
  </div>

  <div class="upload" onclick="document.getElementById('fileIn').click()">
    <p>문제 사진을 클릭해서 올려주세요</p>
    <small>JPG, PNG 등 이미지 파일 가능</small>
    <input type="file" id="fileIn" accept="image/*" style="display:none" onchange="loadImg(event)">
  </div>

  <img id="previewImg" />
  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">이 문제 분석하기</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loadingMsg">개념 분석 중...</p>
  </div>

  <div class="concept-card card" id="conceptBox">
    <p class="section-label">이 문제에 필요한 개념</p>
    <div class="tags" id="tags"></div>
  </div>

  <div class="sol-card card" id="solBox">
    <h3>단계별 풀이</h3>
    <div id="solContent"></div>
    <div class="graph-wrap" id="graphWrap">
      <h4>그래프</h4>
      <div id="calculator"></div>
    </div>
  </div>

  <div class="chat-wrap" id="chatWrap">
    <div class="chat-header">모르는 부분을 질문해 보세요</div>
    <div class="chat-msgs" id="chatMsgs">
      <div class="msg bot">풀이를 보고 모르는 부분이 있으면 편하게 질문해 주세요!</div>
    </div>
    <div class="chat-input">
      <input type="text" id="chatIn" placeholder="질문을 입력하세요..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()">전송</button>
    </div>
  </div>
</div>

<script>
let imgData = null;
let imgType = null;
let history = [];
let context = '';
let calculator = null;

function loadImg(e) {
  const f = e.target.files[0];
  if (!f) return;
  imgType = f.type;
  const r = new FileReader();
  r.onload = ev => {
    imgData = ev.target.result.split(',')[1];
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('analyzeBtn').style.display = 'block';
    document.getElementById('conceptBox').style.display = 'none';
    document.getElementById('solBox').style.display = 'none';
    document.getElementById('chatWrap').style.display = 'none';
    document.getElementById('graphWrap').style.display = 'none';
  };
  r.readAsDataURL(f);
}

function renderMath(el) {
  renderMathInElement(el, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '$', right: '$', display: false}
    ],
    throwOnError: false
  });
}

function drawGraph(expressions) {
  if (!expressions || expressions.length === 0) return;
  const graphWrap = document.getElementById('graphWrap');
  graphWrap.style.display = 'block';
  if (calculator) calculator.destroy();
  const elt = document.getElementById('calculator');
  calculator = Desmos.GraphingCalculator(elt, { expressionsCollapsed: true });
  expressions.forEach((expr, i) => {
    calculator.setExpression({ id: 'g' + i, latex: expr });
  });
}

async function analyze() {
  if (!imgData) { alert('문제 사진을 먼저 올려주세요.'); return; }
  document.getElementById('analyzeBtn').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('loadingMsg').textContent = '개념 분석 중...';

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageData: imgData, mediaType: imgType })
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error);
    }

    context = JSON.stringify(data);
    history = [];

    document.getElementById('loading').style.display = 'none';
    document.getElementById('tags').innerHTML = data.concepts.map(c => `<span class="tag">${c}</span>`).join('');
    document.getElementById('conceptBox').style.display = 'block';

    let html = data.steps.map(s => `
      <div class="step">
        <div class="snum">${s.num}</div>
        <div class="stxt">${s.text}</div>
      </div>`).join('');
    html += `<div class="answer-box">정답: ${data.answer}</div>`;

    const solContent = document.getElementById('solContent');
    solContent.innerHTML = html;
    renderMath(solContent);

    document.getElementById('solBox').style.display = 'block';
    document.getElementById('chatWrap').style.display = 'block';

    if (data.graphs && data.graphs.length > 0) {
      drawGraph(data.graphs);
    }

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').style.display = 'block';
    alert('오류: ' + err.message);
  }
}

async function sendMsg() {
  const inp = document.getElementById('chatIn');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';

  const box = document.getElementById('chatMsgs');
  box.innerHTML += `<div class="msg user">${msg}</div>`;
  box.scrollTop = box.scrollHeight;
  history.push({ role: 'user', content: msg });

  const typing = document.createElement('div');
  typing.className = 'msg bot';
  typing.id = 'typing';
  typing.textContent = '입력 중...';
  box.appendChild(typing);
  box.scrollTop = box.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, context })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    history.push({ role: 'assistant', content: data.reply });
    document.getElementById('typing')?.remove();
    const msgEl = document.createElement('div');
    msgEl.className = 'msg bot';
    msgEl.innerHTML = data.reply;
    box.appendChild(msgEl);
    renderMath(msgEl);
    box.scrollTop = box.scrollHeight;
  } catch (err) {
    document.getElementById('typing')?.remove();
    box.innerHTML += `<div class="msg bot">죄송합니다. 잠시 후 다시 질문해 주세요.</div>`;
  }
}
</script>
</body>
</html>
